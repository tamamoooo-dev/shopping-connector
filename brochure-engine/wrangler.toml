# Cloudflare Worker config for the Brochure Engine.
# Deploy:  npx wrangler deploy   (after `npx wrangler login`)
#
# Unlike the stateless search connector, this Worker is STATEFUL: it binds a D1
# database (metadata index + history + dedupe) and an object store (brochure
# bytes), and runs on a weekly Cron trigger.
name = "brochure-engine"
main = "src/index.js"
compatibility_date = "2025-06-01"

# Ingest cron (§6.3) — Architecture C: Self Service-Binding Fan-out.
# Fires on the Saudi publication days (Tue & Wed) at 06:00 UTC (= 09:00 AST).
# Each fire refreshes ALL stores TOGETHER: scheduled() fans out to one child
# Worker invocation per store via the SELF binding below, and each child carries
# its own fresh 50-subrequest budget — so an all-stores refresh fits the Free
# plan without staggering across days. Running both Tue AND Wed catches whichever
# day the brochures actually drop; the checksum dedupe makes the second fire free
# of extra writes. (This replaces M2's daily one-store-per-fire rotation, which
# spread the refresh across ~8 days.) Day/time are easily tunable here.
[triggers]
crons = [
  # Tue & Wed catch the Saudi weekly drop; Fri closes the WEEKEND coverage
  # hole: ~20% of offers expire Thu-Mon and weekend flyers publish Thu/Fri,
  # so without a Friday fire the marketplace thins out exactly when the user
  # shops. Same per-fire budget as Tue/Wed (§19.C); unchanged flyers dedupe
  # to zero KV writes, offers upsert is D1-only.
  "0 6 * * 2,3,5", # brochure/offers pipeline (fan-out -> prices -> prune)
  "45 5 * * *",    # daily Price Monitoring: check every active watch (08:45 AST)
  # Vision enrichment drain (steady-state autonomy, 2026-07-19): Vision is an
  # INGESTION step — every new offer goes through it exactly once (user
  # directive: no reuse gates in front of Vision) — so throughput must absorb
  # the Tuesday-night burst without manual backfills. Each fire is its own
  # budget (6 sequential children × 15 offers ≈ 90; §40 bump from 4), 3 fires/hour
  # ⇒ up to ~6.5k offers/day; an empty queue costs one D1 count. Minutes 10/30/50
  # keep clear of the 05:45 watch fire and the 06:00 ingest fan-out.
  # Inert without the MISTRAL_API_KEY secret, exactly like the drain itself.
  "10,30,50 * * * *", # steady-state vision drain (yields to a background job)
  # Background Manual Vision — near-continuous drain (Vision Milestone 2 §2, cron
  # redesign 2026-07-20). Fires EVERY MINUTE but is a single cheap D1 read unless
  # an operator has a job running; then it drains a bounded chunk (VISION_DRAIN_BATCHES
  # children/fire, paced by Mistral) as the SOLE resolution writer — a D1 lease
  # prevents overlapping fires, and the 10/30/50 drain + Monday maintenance yield
  # to a running job. Replaces the fragile self-continuing /enrich/step chain
  # (a fetch-invocation waitUntil can't keep a 30s hop alive). Inert (one D1 read)
  # without a running job or without MISTRAL_API_KEY.
  "* * * * *", # Background Manual Vision continuous drain (no-op when idle)
]

# --- SELF service binding: the cron fan-out mechanism (Architecture C) ---------
# Binds this Worker to itself so scheduled() can invoke POST /ingest?store=<id>
# once per store, concurrently, each in its own invocation + subrequest budget.
# Available on the Free plan. Swapping the fan-out to another scheduler (e.g. a
# Queue) is a scheduler.js change; this binding is the only infra it needs.
[[services]]
binding = "SELF"
service = "brochure-engine"

# --- CONNECTOR service binding: the Search engine (Price History, Pillar 3) ----
# Binds the stateless search connector Worker so the weekly price-history capture
# can read each product's CURRENT market price (the only automated price source —
# brochure images would need OCR, out of scope). Same account, Free plan, $0. The
# connector stays the single source of live prices; Price History just samples it
# once per brochure edition.
[[services]]
binding = "CONNECTOR"
service = "shopping-connector"

# --- MetadataStore: D1 (index + history + dedupe unique index) ---------------
# Create once:  npx wrangler d1 create brochure-engine
# then paste the returned database_id below and apply schema.sql.
[[d1_databases]]
binding = "DB"
database_name = "brochure-engine"
database_id = "50bbe1ea-aca0-4f1d-abfd-c586335d82ba"

# --- ObjectStore: R2 (preferred) ---------------------------------------------
# Requires R2 to be enabled on the account. If R2 is available, uncomment and
# create the bucket:  npx wrangler r2 bucket create brochure-engine
# [[r2_buckets]]
# binding = "BROCHURES"
# bucket_name = "brochure-engine"

# --- ObjectStore: KV (fallback used when R2 is not available) -----------------
# The storage interface (§5) makes this a drop-in for R2. Create once:
#   npx wrangler kv namespace create BROCHURES_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "BROCHURES_KV"
id = "38b0639256a34d1ebd7d96dcb55d0a9b"

# INGEST_SECRET (guards POST /ingest) is a secret, not committed:
#   npx wrangler secret put INGEST_SECRET

# OPS_TOKEN (guards the /__ops Operations Console — src/ops/) is a SEPARATE
# secret for HUMAN operators; INGEST_SECRET stays machine-only. Make it long
# and random. Until it is set, /__ops answers 503 (console locked):
#   npx wrangler secret put OPS_TOKEN
# After deploying, apply the audit-table migration once:
#   npx wrangler d1 execute brochure-engine --remote --file=./migrate-2026-07-ops.sql
