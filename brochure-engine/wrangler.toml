# Cloudflare Worker config for the Brochure Engine.
# Deploy:  npx wrangler deploy   (after `npx wrangler login`)
#
# Unlike the stateless search connector, this Worker is STATEFUL: it binds a D1
# database (metadata index + history + dedupe) and an object store (brochure
# bytes), and runs on a weekly Cron trigger.
name = "brochure-engine"
main = "src/index.js"
compatibility_date = "2025-06-01"

# Ingest cron (§6.3) — Architecture C: Self Service-Binding Fan-out.
# The brochure/offers pipeline fires 4×/week, all timed to the Saudi weekly
# publication cycle (all times Asia/Riyadh = AST = UTC+3, no DST). Each fire
# refreshes ALL stores TOGETHER: scheduled() fans out to one child Worker
# invocation per store via the SELF binding below, and each child carries its own
# fresh 50-subrequest budget — so an all-stores refresh fits the Free plan
# without staggering across days. A fire that finds nothing new is cheap: the
# checksum dedupe skips the page-image downloads and byte writes entirely
# (only the leaflet HTML + offers pull remain), so the extra fires are near-free.
# (This replaces M2's daily one-store-per-fire rotation, which spread the refresh
# across ~8 days.) Day/time are easily tunable here.
#
# Why these four fires (was Tue/Wed/Fri 09:00): the two Wednesday-adjacent fires
# catch the main weekly drop at the moment it lands (many stores publish just
# after midnight into Wed; others not until Wed morning); the Thursday fire is a
# safety net for delayed or corrected Wednesday flyers; the Friday fire keeps the
# WEEKEND coverage the old schedule had — ~20% of offers expire Thu-Mon and
# weekend flyers publish Thu/Fri, so without it the marketplace thins out exactly
# when the user shops.
[triggers]
crons = [
  "0 22 * * 2", # Wed 01:00 AST — catch the post-midnight Wed drop
  "0 6 * * 3",  # Wed 09:00 AST — catch Wed-morning publishers
  "0 6 * * 4",  # Thu 09:00 AST — catch delayed / corrected Wed flyers
  "0 6 * * 5",  # Fri 09:00 AST — weekend coverage (Thu/Fri drops, Thu-Mon expiries)
  "45 5 * * *", # daily Price Monitoring: check every active watch (08:45 AST)
]

# --- SELF service binding: the cron fan-out mechanism (Architecture C) ---------
# Binds this Worker to itself so scheduled() can invoke POST /ingest?store=<id>
# once per store, concurrently, each in its own invocation + subrequest budget.
# Available on the Free plan. Swapping the fan-out to another scheduler (e.g. a
# Queue) is a scheduler.js change; this binding is the only infra it needs.
[[services]]
binding = "SELF"
service = "brochure-engine"

# --- CONNECTOR service binding: the Search engine (Price History, Pillar 3) ----
# Binds the stateless search connector Worker so the weekly price-history capture
# can read each product's CURRENT market price (the only automated price source —
# brochure images would need OCR, out of scope). Same account, Free plan, $0. The
# connector stays the single source of live prices; Price History just samples it
# once per brochure edition.
[[services]]
binding = "CONNECTOR"
service = "shopping-connector"

# --- MetadataStore: D1 (index + history + dedupe unique index) ---------------
# Create once:  npx wrangler d1 create brochure-engine
# then paste the returned database_id below and apply schema.sql.
[[d1_databases]]
binding = "DB"
database_name = "brochure-engine"
database_id = "50bbe1ea-aca0-4f1d-abfd-c586335d82ba"

# --- ObjectStore: R2 (preferred) ---------------------------------------------
# Requires R2 to be enabled on the account. If R2 is available, uncomment and
# create the bucket:  npx wrangler r2 bucket create brochure-engine
# [[r2_buckets]]
# binding = "BROCHURES"
# bucket_name = "brochure-engine"

# --- ObjectStore: KV (fallback used when R2 is not available) -----------------
# The storage interface (§5) makes this a drop-in for R2. Create once:
#   npx wrangler kv namespace create BROCHURES_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "BROCHURES_KV"
id = "38b0639256a34d1ebd7d96dcb55d0a9b"

# INGEST_SECRET (guards POST /ingest) is a secret, not committed:
#   npx wrangler secret put INGEST_SECRET
